services:
  rustio:
    image: ${RUSTIO_IMAGE_NAME:-rustio-rustio}
    build:
      context: .
      dockerfile: Dockerfile.rustio
    container_name: ${RUSTIO_CONTAINER_NAME:-rustio}
    environment:
      RUSTIO_ADDR: ${RUSTIO_ADDR:-0.0.0.0:9000}
      RUSTIO_DATA_DIR: ${RUSTIO_DATA_DIR_CONTAINER:-/app/data}
      RUSTIO_CONSOLE_DIST: /app/web/console/dist
      RUSTIO_MEMORY_TRIM_ENABLED: ${RUSTIO_MEMORY_TRIM_ENABLED:-true}
      RUSTIO_MEMORY_TRIM_INTERVAL_SECONDS: ${RUSTIO_MEMORY_TRIM_INTERVAL_SECONDS:-300}
      RUSTIO_MEMORY_TRIM_IDLE_SECONDS: ${RUSTIO_MEMORY_TRIM_IDLE_SECONDS:-900}
      RUSTIO_MEMORY_TRIM_FORCE_INTERVAL_SECONDS: ${RUSTIO_MEMORY_TRIM_FORCE_INTERVAL_SECONDS:-7200}
      RUSTIO_MEMORY_TRIM_RSS_THRESHOLD_MB: ${RUSTIO_MEMORY_TRIM_RSS_THRESHOLD_MB:-128}
      MALLOC_ARENA_MAX: ${MALLOC_ARENA_MAX:-2}
      MALLOC_TRIM_THRESHOLD_: ${MALLOC_TRIM_THRESHOLD_:-131072}
    ports:
      - "${RUSTIO_HOST_PORT:-9000}:${RUSTIO_CONTAINER_PORT:-9000}"
    volumes:
      - "${RUSTIO_DATA_DIR_HOST:-./data}:${RUSTIO_DATA_DIR_CONTAINER:-/app/data}"
    restart: ${RUSTIO_RESTART_POLICY:-unless-stopped}
