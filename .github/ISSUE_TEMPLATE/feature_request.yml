name: 功能建议
description: 提交新功能、体验优化或架构改进建议
title: "[建议] "
body:
  - type: markdown
    attributes:
      value: |
        欢迎提交功能建议。请尽量说明目标、场景与收益，方便评估优先级。

  - type: textarea
    id: background
    attributes:
      label: 背景与问题
      description: 当前遇到了什么问题，为什么需要这个能力
      placeholder: 例如：单节点部署够用，但希望增加更清晰的多节点引导和可视化状态
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述你希望新增或改进的内容
      placeholder: 例如：在控制台新增集群向导，并展示节点加入、健康和 quorum 状态
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: 业务价值
      description: 这个能力会带来什么收益
      placeholder: 例如：降低部署门槛、提升故障排查效率、增强可观测性
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否有替代做法或折中方案
      placeholder: 例如：先通过 CLI 暴露能力，后续再补控制台入口

  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - S3 接口
        - 管理控制台
        - 集群与元数据
        - 复制与生命周期
        - 安全与 IAM
        - 可观测性与运维
        - 部署与文档
        - 其他
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issues，确认不是重复建议
          required: true
        - label: 我已尽量描述使用场景与预期收益
          required: true
